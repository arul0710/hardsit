<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardSit Tracking</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #8b5cf6;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
        }

        .info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .box {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
        }

        .box h3 {
            margin-bottom: 10px;
            color: #8b5cf6;
        }

        #map {
            height: 500px;
            border-radius: 15px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #8b5cf6;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #7c3aed;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Track Your Request</h1>

        <div class="card">

            <div class="info">

                <div class="box">
                    <h3>Service</h3>
                    <p id="service">Loading...</p>
                </div>

                <div class="box">
                    <h3>Status</h3>
                    <p id="status">Pending</p>
                </div>

                <div class="box">
                    <h3>Distance</h3>
                    <p id="distance">Calculating...</p>
                </div>

                <div class="box">
                    <h3>Customer</h3>
                    <p id="customer">Loading...</p>
                </div>

            </div>

            <div id="map"></div>

            <button onclick="goHome()">
                Back To Home
            </button>

        </div>

    </div>

    <script>

        let request =
            JSON.parse(
                localStorage.getItem("currentRequest")
            );

        if (!request) {
            alert("No Active Request Found");
            window.location.href = "index.html";
        }

        document.getElementById("service").innerText =
            request.service || "-";

        document.getElementById("customer").innerText =
            request.name || "-";

        function getDistance(lat1, lon1, lat2, lon2) {

            const R = 6371;

            const dLat =
                (lat2 - lat1) * Math.PI / 180;

            const dLon =
                (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) *
                Math.sin(dLon / 2);

            const c =
                2 * Math.atan2(
                    Math.sqrt(a),
                    Math.sqrt(1 - a)
                );

            return (R * c).toFixed(2);
        }

        let userLat =
            parseFloat(request.userLat);

        let userLng =
            parseFloat(request.userLng);

        let employeeLat =
            parseFloat(localStorage.getItem("employeeLat"));

        let employeeLng =
            parseFloat(localStorage.getItem("employeeLng"));

        if (isNaN(userLat) || isNaN(userLng)) {
            userLat = 11.0168;
            userLng = 76.9558;
        }

        if (isNaN(employeeLat) || isNaN(employeeLng)) {
            employeeLat = userLat + 0.02;
            employeeLng = userLng + 0.02;
        }

        let map =
            L.map("map").setView(
                [userLat, userLng],
                13
            );

        L.tileLayer(
            "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                maxZoom: 19
            }
        ).addTo(map);

        let customerMarker =
            L.marker([userLat, userLng])
                .addTo(map)
                .bindPopup("Customer Location");

        let employeeMarker =
            L.marker([employeeLat, employeeLng])
                .addTo(map)
                .bindPopup("Employee Location");

        L.polyline(
            [
                [userLat, userLng],
                [employeeLat, employeeLng]
            ]
        ).addTo(map);

        document.getElementById("distance").innerText =
            getDistance(
                userLat,
                userLng,
                employeeLat,
                employeeLng
            ) + " KM";

        function refreshStatus() {

            document.getElementById("status").innerText =
                localStorage.getItem("requestStatus")
                || "Pending";

        }

        setInterval(refreshStatus, 3000);

        refreshStatus();

        function goHome() {
            window.location.href =
                "index.html";
        }

    </script>

</body>

</html>
