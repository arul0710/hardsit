<!DOCTYPE html>
<html>

<head>
    <title>Emergency Service</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 20px;
        }

        .box {
            background: white;
            width: 80%;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>🚨 Emergency Service</h1>

        <p id="location">Getting Location...</p>

        <iframe id="map"></iframe>

        <button onclick="requestService()">
            Emergency Request
        </button>

    </div>

    <script>

        navigator.geolocation.getCurrentPosition(

            function (position) {

                let lat = position.coords.latitude;
                let lon = position.coords.longitude;

                document.getElementById("location").innerHTML =
                    "Latitude : " + lat +
                    "<br>Longitude : " + lon;

                document.getElementById("map").src =
                    "https://maps.google.com/maps?q="
                    + lat + "," + lon +
                    "&z=15&output=embed";

            },

            function () {
                document.getElementById("location").innerHTML =
                    "Location Permission Denied";
            }

        );

        function requestService() {
            alert("Emergency Request Sent Successfully");
        }

    </script>

</body>

</html>
